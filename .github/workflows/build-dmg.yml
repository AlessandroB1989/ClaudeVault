name: Build DMG

# Construit ClaudeVault.app et l'emballe en .dmg.
#  • Sur un tag vX.Y.Z  → attache le .dmg à la release correspondante.
#  • Manuellement (Run workflow) → publie le .dmg en artefact téléchargeable.
#
# Signature AD-HOC pour l'instant (aucun secret requis). Le jour où l'adhésion
# Apple Developer est active, voir le bloc « Notarisation » commenté plus bas.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour attacher le .dmg à la release

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sélectionner Xcode (16+ requis pour ce projet)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Version Xcode
        run: xcodebuild -version

      - name: Build du .dmg (ad-hoc)
        run: bash macos-app/scripts/build-dmg.sh

      # --- Notarisation (à activer plus tard) ---------------------------------
      # Quand le compte Developer sera actif, ajoute ces secrets au repo :
      #   DEV_ID_CERT_P12_BASE64  (certificat "Developer ID Application" exporté .p12, base64)
      #   DEV_ID_CERT_PASSWORD    (mot de passe du .p12)
      #   APPLE_TEAM_ID           (Team ID 10 caractères)
      #   NOTARY_APPLE_ID         (alexandre@baair.solutions)
      #   NOTARY_APP_PASSWORD     (mot de passe d'app)
      # puis remplace l'étape « Build du .dmg (ad-hoc) » par :
      #
      #   - name: Importer le certificat
      #     env:
      #       P12: ${{ secrets.DEV_ID_CERT_P12_BASE64 }}
      #       P12_PWD: ${{ secrets.DEV_ID_CERT_PASSWORD }}
      #     run: |
      #       echo "$P12" | base64 --decode > /tmp/cert.p12
      #       security create-keychain -p ci build.keychain
      #       security default-keychain -s build.keychain
      #       security unlock-keychain -p ci build.keychain
      #       security import /tmp/cert.p12 -k build.keychain -P "$P12_PWD" -T /usr/bin/codesign
      #       security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
      #   - name: Enregistrer les identifiants notarytool
      #     run: |
      #       xcrun notarytool store-credentials claudevault-notary \
      #         --apple-id "${{ secrets.NOTARY_APPLE_ID }}" \
      #         --team-id "${{ secrets.APPLE_TEAM_ID }}" \
      #         --password "${{ secrets.NOTARY_APP_PASSWORD }}"
      #   - name: Build notarisé
      #     env:
      #       SIGN_IDENTITY: "Developer ID Application"
      #       TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #       NOTARY_PROFILE: claudevault-notary
      #     run: bash macos-app/scripts/build-dmg.sh
      # ------------------------------------------------------------------------

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeVault-dmg
          path: dist/ClaudeVault.dmg
          if-no-files-found: error

      - name: Attacher le .dmg à la release (sur tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/ClaudeVault.dmg --clobber
          else
            gh release create "$TAG" dist/ClaudeVault.dmg \
              --title "ClaudeVault $TAG" --generate-notes
          fi
